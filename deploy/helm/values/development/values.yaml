datacollectorservice:
  application: data-collector-service
  name: data-collector-service
  namespace: data-collector-services
  image:
    registry: registry.hub.docker.com/library
    name: busybox
    version: 1.35.0
    
  port:
    name: datac-port
    number: 2500
  replicaCount: 2
  service:
    name: data-collector-svc
    port: 8080
    type: ClusterIP
  
  serviceAccountName: data-collector-admin
  stage: development
  tier: backend
  version: 0.0.1
